apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoneshop
  namespace: phoneshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phoneshop
  template:
    metadata:
      labels:
        app: phoneshop
    spec:
      containers:
        - name: phoneshop
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/phoneshop:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: env-file
              mountPath: /home/ubuntu/.env
              subPath: .env
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: env-file
          secret:
            secretName: phoneshop-env
